name: Custom Docker Image

on:
  push:
    branches:
      - master
    paths:
      - Dockerfile.custom
      - scripts/apply_custom_fallback_patch.py
      - src/config/proxygroup.h
      - src/config/binding.h
      - src/generator/config/subexport.cpp
      - scripts/build.alpine.release.sh
      - .github/workflows/custom-docker.yml
  workflow_dispatch:
    inputs:
      tag:
        description: Image tag to publish
        required: true
        default: custom

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve build settings
        id: settings
        shell: bash
        run: |
          TAG="${{ github.event.inputs.tag }}"

          if [ -z "$TAG" ]; then
            TAG="custom"
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Build and push linux/amd64 image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.custom
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.settings.outputs.tag }}
            ghcr.io/${{ github.repository }}:latest
