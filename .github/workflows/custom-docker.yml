name: Custom Docker Image

on:
  workflow_dispatch:
    inputs:
      platform:
        description: Docker platform to build for the target NAS
        required: true
        default: linux/amd64
        type: choice
        options:
          - linux/amd64
          - linux/arm64
      tag:
        description: Image tag to publish
        required: true
        default: custom

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve build settings
        id: settings
        shell: bash
        run: |
          PLATFORM="${{ github.event.inputs.platform }}"
          TAG="${{ github.event.inputs.tag }}"

          if [ -z "$PLATFORM" ]; then
            PLATFORM="linux/amd64"
          fi
          if [ -z "$TAG" ]; then
            TAG="custom"
          fi

          echo "platform=$PLATFORM" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.custom
          platforms: ${{ steps.settings.outputs.platform }}
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.settings.outputs.tag }}
            ghcr.io/${{ github.repository }}:latest
